name: Desktop beta

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-beta.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-latest
            script: dist:mac
            artifact: araon-desktop-mac
          - platform: win
            os: windows-latest
            script: dist:win
            artifact: araon-desktop-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build desktop artifact
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/desktop/*.dmg
            release/desktop/*.zip
            release/desktop/*.exe
            release/desktop/*.blockmap
            release/desktop/latest*.yml
          if-no-files-found: error

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --title "Araon ${TAG_NAME}" --prerelease --notes "Unsigned Araon desktop beta artifacts."
          shopt -s nullglob
          assets=(
            release/desktop/*.dmg
            release/desktop/*.zip
            release/desktop/*.exe
            release/desktop/*.blockmap
            release/desktop/latest*.yml
          )
          gh release upload "$TAG_NAME" "${assets[@]}" --clobber
